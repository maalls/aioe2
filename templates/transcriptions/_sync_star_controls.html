<div data-component="timeline-controls" class="mt-3">
  <div class="inline-flex items-center gap-2">
    <button
      type="button"
      class="sync-toggle inline-flex items-center justify-center p-1 text-slate-700 hover:text-brand-accent"
      data-sync-linked="1"
      title="Activer/desactiver la synchro audio-timeline"
    >
      <i class="sync-icon-link fa-solid fa-link text-sm"></i>
      <i class="sync-icon-unlink fa-solid fa-link-slash hidden text-sm"></i>
    </button>
    <button
      type="button"
      class="star-filter-toggle inline-flex items-center justify-center p-1 text-slate-500 hover:text-amber-500"
      data-star-filtered="0"
      title="Filtrer les segments bookmarkes"
    >
      <i class="star-icon-off fa-regular fa-star text-sm"></i>
      <i class="star-icon-on fa-solid fa-star hidden text-sm text-amber-500"></i>
    </button>
  </div>
</div>
