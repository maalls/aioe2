{% extends "base.html" %}

{% block title %}Transcription Viewer{% endblock %}

{% block content %}
  <div x-data="{ loading: false }" class="-mt-8 -mx-4 sm:-mx-6 lg:-mx-8">
    <div x-show="loading" x-cloak class="mb-4">
      <p class="text-sm text-brand-slate">Chargement de la transcription...</p>
    </div>

    <div id="viewer-panel">
      {% include "transcriptions/_viewer_panel.html" with selected_folder=selected_folder folder_data=folder_data folders=folders %}
    </div>
  </div>
{% endblock %}
