<script data-module="segments-table-interactions">
(function () {
  // Destroy previous instance for consistent HTMX swap hygiene.
  const _modules = window.__htmxModules = window.__htmxModules || {};
  if (_modules['segments-table-interactions']) {
    _modules['segments-table-interactions'].destroy();
    delete _modules['segments-table-interactions'];
  }
  _modules['segments-table-interactions'] = { destroy: function () {} };

  const root = document.getElementById('timeline-sync-root');
  if (!root) return;
  const bookmarkUrl = root.getAttribute('data-bookmark-url') || '';
  if (!bookmarkUrl) return;

  function showGlobalError(message) {
    if (window.appUi && typeof window.appUi.emitAjaxError === 'function') {
      window.appUi.emitAjaxError(message);
      return;
    }

    const errorMessage = message || 'Erreur backend.';
    window.dispatchEvent(new CustomEvent('app:ajax-error', { detail: { message: errorMessage } }));
  }

  function getCsrfToken() {
    const inlineToken = root.querySelector('[data-csrf-token]');
    const inlineValue = inlineToken ? (inlineToken.value || '').trim() : '';
    if (inlineValue && inlineValue !== 'NOTPROVIDED') {
      return inlineValue;
    }

    const match = document.cookie.match(/(?:^|; )csrftoken=([^;]+)/);
    return match ? decodeURIComponent(match[1]) : '';
  }

  function setBookmarkVisual(toggle, bookmarked) {
    toggle.setAttribute('data-bookmarked', bookmarked ? '1' : '0');
    const rowItem = toggle.closest('[data-segment-item]');
    if (rowItem) {
      rowItem.setAttribute('data-segment-bookmarked', bookmarked ? '1' : '0');
    }
    const icon = toggle.querySelector('i');
    if (!icon) return;
    icon.classList.toggle('fa-solid', bookmarked);
    icon.classList.toggle('text-amber-500', bookmarked);
    icon.classList.toggle('fa-regular', !bookmarked);
    icon.classList.toggle('text-slate-300', !bookmarked);
  }

  root.querySelectorAll('[data-bookmark-toggle]').forEach((toggle) => {
    toggle.addEventListener('click', async (event) => {
      event.preventDefault();
      event.stopPropagation();

      const segmentKey = toggle.getAttribute('data-segment-key') || '';
      if (!segmentKey) return;

      const current = toggle.getAttribute('data-bookmarked') === '1';
      const next = !current;
      setBookmarkVisual(toggle, next);

      try {
        const response = await fetch(bookmarkUrl, {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrfToken(),
          },
          body: JSON.stringify({
            segment_key: segmentKey,
            bookmarked: next,
          }),
        });

        if (!response.ok) {
          if (window.appUi && typeof window.appUi.buildAjaxErrorMessage === 'function') {
            const message = await window.appUi.buildAjaxErrorMessage(response, 'Impossible de mettre a jour le bookmark');
            throw new Error(message);
          }
          throw new Error(`Impossible de mettre a jour le bookmark (HTTP ${response.status})`);
        }
      } catch (error) {
        setBookmarkVisual(toggle, current);
        showGlobalError(error && error.message ? error.message : 'Impossible de mettre a jour le bookmark.');
      }
    });
  });
})();

(function () {
  const player = document.getElementById('preview-player');
  const syncRoot = document.getElementById('timeline-sync-root');
  if (!player || !syncRoot) return;
  const root = syncRoot;
  const container = document.getElementById('timeline-content-pane') || document.scrollingElement;
  let lastActiveEl = null;

  const segments = Array.from(root.querySelectorAll('[data-start][data-end]'))
    .map((el) => {
      const start = parseFloat(el.dataset.start || '0');
      const end = parseFloat(el.dataset.end || '0');
      if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) {
        return null;
      }
      return { el, start, end };
    })
    .filter(Boolean);

  let activeIndex = -1;

  function clearActive() {
    if (activeIndex >= 0 && segments[activeIndex]) {
      segments[activeIndex].el.classList.remove('bg-indigo-50');
    }
    activeIndex = -1;
    lastActiveEl = null;
  }

  function findActiveIndexAt(time) {
    if (!segments.length) return -1;

    // Fast path: stay on current segment.
    if (activeIndex >= 0) {
      const curr = segments[activeIndex];
      if (time >= curr.start && time < curr.end) {
        return activeIndex;
      }

      // Incremental step when media advances/seeks near current position.
      if (time >= curr.end) {
        let i = activeIndex + 1;
        while (i < segments.length && time >= segments[i].end) i += 1;
        if (i < segments.length && time >= segments[i].start && time < segments[i].end) {
          return i;
        }
      } else {
        let i = activeIndex - 1;
        while (i >= 0 && time < segments[i].start) i -= 1;
        if (i >= 0 && time >= segments[i].start && time < segments[i].end) {
          return i;
        }
      }
    }

    // Fallback: binary search for large seeks.
    let lo = 0;
    let hi = segments.length - 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const seg = segments[mid];
      if (time < seg.start) {
        hi = mid - 1;
      } else if (time >= seg.end) {
        lo = mid + 1;
      } else {
        return mid;
      }
    }
    return -1;
  }

  function scrollElementIntoContainer(el) {
    if (!container || container === document.scrollingElement) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const containerRect = container.getBoundingClientRect();
    const elRect = el.getBoundingClientRect();
    const delta = elRect.top - containerRect.top - container.clientHeight / 2 + elRect.height / 2;
    container.scrollTo({ top: container.scrollTop + delta, behavior: 'smooth' });
  }

  player.addEventListener('timeupdate', () => {
    const syncEnabled = syncRoot ? syncRoot.getAttribute('data-sync-linked') === '1' : true;
    if (!syncEnabled) {
      clearActive();
      return;
    }

    const t = player.currentTime;
    if (!Number.isFinite(t)) {
      clearActive();
      return;
    }
    const nextIndex = findActiveIndexAt(t);

    if (nextIndex !== activeIndex) {
      if (activeIndex >= 0 && segments[activeIndex]) {
        segments[activeIndex].el.classList.remove('bg-indigo-50');
      }

      activeIndex = nextIndex;

      if (activeIndex >= 0 && segments[activeIndex]) {
        const activeEl = segments[activeIndex].el;
        activeEl.classList.add('bg-indigo-50');
        if (activeEl !== lastActiveEl) {
          lastActiveEl = activeEl;
          scrollElementIntoContainer(activeEl);
        }
      } else {
        lastActiveEl = null;
      }
    }
  });
})();
</script>
