<header class="mb-6 rounded-2xl border border-slate-200 bg-white/80 p-6 shadow-card backdrop-blur">
  <p class="text-xs font-semibold uppercase tracking-[0.24em] text-brand-slate">{{ eyebrow|default:"AIOE" }}</p>
  <h1 class="mt-2 text-2xl font-bold tracking-tight text-brand-ink sm:text-3xl">{{ title }}</h1>
  {% if subtitle %}
    <p class="mt-2 max-w-3xl text-sm text-slate-600 sm:text-base">{{ subtitle }}</p>
  {% endif %}
</header>
